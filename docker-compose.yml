services:
  kv_store_1:
    build: .
    container_name: kv_store_1
    ports:
      - "8081:8080"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - kv_network
    volumes:
      - ./data_store_1:/app/data

  kv_store_2:
    build: .
    container_name: kv_store_2
    ports:
      - "8082:8080"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - kv_network
    volumes:
      - ./data_store_2:/app/data

  kv_store_3:
    build: .
    container_name: kv_store_3
    ports:
      - "8083:8080"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - kv_network
    volumes:
      - ./data_store_3:/app/data

  router:
    build:
      context: .
      dockerfile: Dockerfile.router
    container_name: kv_router
    ports:
      - "8080:8080"
    depends_on:
      - kv_store_1
      - kv_store_2
      - kv_store_3
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - kv_network

networks:
  kv_network:
    driver: bridge
